services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediops_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    environment:
      - VITE_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - mediops_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediops_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - mediops_network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: mediops_worker
    env_file:
      - .env
    volumes:
      - ./worker:/app
    depends_on:
      - redis
      - postgres
    command: python app/main.py
    networks:
      - mediops_network

  postgres:
    image: postgres:16
    container_name: mediops_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediops_password}
      POSTGRES_DB: ${POSTGRES_DB:-mediops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mediops_network

  redis:
    image: redis:7
    container_name: mediops_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mediops_network

volumes:
  postgres_data:
  redis_data:

networks:
  mediops_network:
    driver: bridge